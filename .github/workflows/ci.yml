name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - working-directory: apps/mac-desktop
        run: xcodegen generate
      - working-directory: apps/mac-desktop
        run: >-
          xcodebuild -project Xisper.xcodeproj -scheme Xisper
          -configuration Debug CODE_SIGNING_ALLOWED=NO build
